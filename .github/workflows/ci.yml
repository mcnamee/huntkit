name: CI

# Fast feedback on every PR / push: build the image once (amd64, with a
# persistent layer cache so only changed layers rebuild) and run the smoke
# test against it. No push — this only proves the image builds and the tools
# are present.

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build-and-test:
    name: Build & smoke test (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: huntkit:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/tests:/tests" \
            --entrypoint bash \
            huntkit:ci /tests/smoke.sh
